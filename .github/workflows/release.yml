name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

# Run after CI so we never publish a red build. Also avoid overlapping releases.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Opens/updates the "release" PR that bumps versions and updates changelogs.
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # release-plz needs full history for changelogs
      - uses: dtolnay/rust-toolchain@stable
      - name: release-plz (release-pr)
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Publishes crates (in dependency order) + tags/releases once the release PR is
  # merged. Safe to run on every push: it only acts when an unpublished version exists.
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: release-plz (release)
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
