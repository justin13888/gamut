name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC: lets the release job mint a short-lived crates.io token (Trusted Publishing)

# Run after CI so we never publish a red build. Also avoid overlapping releases.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Opens/updates the "release" PR that bumps versions and updates changelogs.
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # release-plz needs full history for changelogs
      - uses: dtolnay/rust-toolchain@stable
      - name: release-plz (release-pr)
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # No registry token needed: release-pr only opens/updates the version-bump
          # PR; it never publishes. crates.io reads (version checks) are unauthenticated.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publishes crates (in dependency order) + tags/releases once the release PR is
  # merged. Safe to run on every push: it only acts when an unpublished version exists.
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      # Exchanges the workflow's OIDC identity for a short-lived crates.io token.
      # Requires Trusted Publishing to be configured on each crate at
      # crates.io/crates/<name>/settings (and each crate to already exist).
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: release-plz (release)
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ephemeral token from the OIDC exchange above — not a stored secret.
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
