name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    name: Format, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The cross-check tests link vendored dav1d/libavif from these submodules.
          submodules: recursive
      - name: Install system build deps (nasm + pkg-config; rest via mise)
        run: sudo apt-get update && sudo apt-get install -y nasm pkg-config
      - uses: jdx/mise-action@v4
        with:
          install_args: cmake ninja meson
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system build deps (nasm + pkg-config; rest via mise)
        run: sudo apt-get update && sudo apt-get install -y nasm pkg-config
      - uses: jdx/mise-action@v4
        with:
          install_args: cmake ninja meson aqua:taiki-e/cargo-llvm-cov
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Generate coverage report
        run: >-
          cargo llvm-cov --workspace --all-features
          --ignore-filename-regex '(crates/gamut-(cli|wasm|ffi)|tooling)/'
          --lcov --output-path lcov.info --fail-under-lines 80
      - name: Generate coverage summary
        run: cargo llvm-cov report --summary-only
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info

  commits:
    name: Conventional Commits
    # Only PRs have a base..head range; validate just the PR's own commits so the
    # pre-existing non-conventional history on master doesn't fail the check.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # convco walks base..head, so it needs full history
      - uses: jdx/mise-action@v4
        with:
          install_args: ubi:convco/convco
      - name: Check PR commit messages
        run: convco check ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
