name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    name: Format, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The cross-check tests link vendored dav1d/libavif from these submodules.
          submodules: recursive
      - name: Install native build deps (vendored dav1d/libavif oracles)
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build nasm cmake pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install native build deps (vendored dav1d/libavif oracles)
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build nasm cmake pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: >-
          cargo llvm-cov --workspace --all-features
          --ignore-filename-regex '(crates/gamut-(cli|wasm|ffi)|tooling)/'
          --lcov --output-path lcov.info --fail-under-lines 80
      - name: Generate coverage summary
        run: cargo llvm-cov report --summary-only
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
