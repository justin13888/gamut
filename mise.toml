# mise-managed dev tools (https://mise.jdx.dev). The Rust toolchain itself stays pinned in
# `rust-toolchain.toml`; mise only provides extra CLIs not covered by rustup.
[tools]
# Mutation-testing CLI. Built from the pinned crate version via the `cargo` backend, which
# works natively on every platform (cargo-mutants ships no aarch64 release binary, so the
# prebuilt `ubi`/`github` backends can't serve Apple Silicon). Pinned for reproducibility;
# bump deliberately. Invoked as `cargo mutants` (see `.cargo/mutants.toml` and the `mutants*`
# recipes in the justfile). First install compiles from source; mise caches the result.
"cargo:cargo-mutants" = "27.1.0"
