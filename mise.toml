# Developer tooling for gamut, managed by mise (https://mise.jdx.dev).
#
# Bootstrap after cloning:
#   mise trust && mise install
# Activate mise in your shell (e.g. `eval "$(mise activate zsh)"`) so these land on
# PATH — the git hooks (lefthook) and `just` recipes invoke them directly.
#
# Not managed here:
#   * Rust   — pinned by rustup via rust-toolchain.toml.
#   * pkg-config — system package (apt/brew); lacks a clean mise backend and is only needed
#     to build the vendored dav1d/libavif cross-check oracles.
#   * nasm   — also lacks a clean mise backend, so the oracle build scripts build it from a
#     committed source tarball (tooling/nasm-vendor); it is not a system dependency.

[tools]
# Dev workflow
just                          = "1.52.0"
lefthook                      = "2.1.9"
jq                            = "1.8.1"
"cargo:convco"                = "0.6.4"   # conventional-commit linter (built from source: its release assets are named convco-{ubuntu,deb,macos}.zip, which the ubi/github backend can't match, and there's no macOS-arm64 asset)
"aqua:taiki-e/cargo-llvm-cov" = "0.8.7"   # coverage (taiki-e prebuilt binary)
"cargo:cargo-edit"            = "0.13.11" # `cargo set-version` for `just bump` (compiled from source)
"cargo:cargo-mutants"         = "27.1.0"

# Native build deps for the cross-check tests (build vendored dav1d/libavif from third_party/)
cmake                         = "4.3.3"
ninja                         = "1.13.2"
meson                         = "1.11.1"  # pipx backend — needs a python3 on PATH
