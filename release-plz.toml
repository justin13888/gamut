# Configuration for release-plz (https://release-plz.dev).
#
# Each crate is versioned independently: there is no shared `[workspace.package].version`,
# so release-plz computes every crate's next version on its own from its conventional-commit
# history, writes a per-crate CHANGELOG.md, and creates a per-crate `<crate>-v<version>` tag
# plus GitHub release. It also rewrites the internal `{ version = "..." }` dependency
# requirements when a dependency bumps, and publishes in dependency-correct order (e.g.
# gamut-core before gamut-color before gamut-avif before gamut), so the crates.io
# "dependency must already be published" constraint is handled for us.

[workspace]
# Refresh the whole `Cargo.lock` (not just workspace members) on a release run.
dependencies_update = true
# Create a GitHub release and tag for each published version.
git_release_enable = true
git_tag_enable = true
# All 17 crates publish to crates.io by default — this reserves the `gamut-*`
# namespace. To stop distributing a crate via crates.io later (e.g. move gamut-wasm
# to npm or gamut-ffi to compiled artifacts), add a `[[package]]` block with
# `publish = false`.
