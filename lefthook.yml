# Reject non-conventional commit messages (policy in .convco). `--from-stdin` reads the
# message being committed; `--strip` drops git's comment/whitespace lines first.
commit-msg:
  commands:
    conventional:
      run: convco check --from-stdin --strip < {1}

pre-commit:
  piped: true
  commands:
    format-fix:
      priority: 1
      glob: "**/*.rs"
      stage_fixed: true
      run: cargo fmt --all
    lint-fix:
      priority: 2
      glob: "**/*.rs"
      stage_fixed: true
      run: cargo clippy --workspace --fix --allow-dirty --allow-staged

pre-push:
  commands:
    conventional:
      # Check only this branch's commits (since it diverged from origin/master);
      # the merge-base excludes master's own (possibly non-conventional) history.
      run: convco check "$(git merge-base origin/master HEAD)..HEAD"
    format-check:
      run: cargo fmt --all --check
    lint-check:
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
    test:
      run: cargo test --workspace --all-features
    coverage:
      run: just coverage
