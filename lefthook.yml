pre-commit:
  piped: true
  commands:
    format-fix:
      priority: 1
      glob: "**/*.rs"
      stage_fixed: true
      run: cargo fmt --all
    lint-fix:
      priority: 2
      glob: "**/*.rs"
      stage_fixed: true
      run: cargo clippy --workspace --fix --allow-dirty --allow-staged

pre-push:
  commands:
    format-check:
      run: cargo fmt --all --check
    lint-check:
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
    test:
      run: cargo test --workspace --all-features
    coverage:
      run: just coverage
