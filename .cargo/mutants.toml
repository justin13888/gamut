# cargo-mutants configuration — https://mutants.rs
# Run via `just mutants` (full workspace) or `just mutants-diff` (changed code only).
# The tool is installed by mise; see `mise.toml`.

# Build & test with all features so the dav1d/libavif/libwebp differential "oracle" tests
# run — they are the strongest signal for the encoder crates. Mirrors `just test`
# (cargo test --workspace --all-features); mutants in gamut-av1/avif/webp therefore need the
# C toolchain + the third_party/ git submodules checked out.
all_features = true

# Don't mutate the binary/binding crates or the dev-only oracle crates: the binaries' entry points
# aren't unit-tested, and `tooling/` holds the differential *reference decoders* (dav1d/libavif) —
# the test oracle, not the system under test, so mutating it is meaningless (and its high-bit-depth
# FFI paths are only exercised once the encoder emits them). This matches the coverage gate, which
# excludes the same set (justfile `coverage`, --ignore-filename-regex). Stub crates
# (av2/jxl/vvc/heic) contain no function bodies and generate no mutants, so they need no entry here.
exclude_globs = [
    "crates/gamut-cli/**",
    "crates/gamut-wasm/**",
    "crates/gamut-ffi/**",
    "tooling/**",
]

# The test suites are fast (sub-second baselines), so a mutant that runs much longer is
# almost always a genuine infinite loop. Keep a floor well above the baseline so a merely
# slow mutant on a loaded CI runner isn't misreported as a timeout, without burning minutes
# per hang.
minimum_test_timeout = 60

# Provably-equivalent mutants: no input distinguishes them from the original, so no test can kill
# them. Each entry is scoped to one function + operator and carries the equivalence argument. Prefer
# tightening the code so a mutant is unviable (e.g. matching on `Ordering` instead of `<`/`>`); only
# list a mutant here when the equivalence is inherent to the arithmetic.
exclude_re = [
    # gamut-av1 quant::dequant — `sign = if dq < 0 { -1 } else { 1 }`. The sign multiplies
    # `(|dq| & 0xFF_FFFF) / dq_denom`, which is 0 exactly when `dq == 0`, the only value where
    # `<` and `<=` disagree. `±0 == 0`, so the reconstruction is identical: equivalent.
    'replace < with <= in dequant',
    # gamut-av1 cdf::diagonal_count — `w + h - 1` is the anti-diagonal count; diagonals at index
    # `≥ w+h-1` are empty (`i_lo > i_hi`), so any bound that is larger or equal walks the same
    # non-empty diagonals and yields an identical scan. All three operator mutations only enlarge
    # (or keep) the bound, hence equivalent; a *smaller* bound (not generated here) would differ.
    'replace \+ with \* in diagonal_count',
    'replace - with \+ in diagonal_count',
    'replace - with / in diagonal_count',
]
