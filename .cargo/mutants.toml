# cargo-mutants configuration — https://mutants.rs
# Run via `just mutants` (full workspace) or `just mutants-diff` (changed code only).
# The tool is installed by mise; see `mise.toml`.

# Build & test with all features so the dav1d/libavif/libwebp differential "oracle" tests
# run — they are the strongest signal for the encoder crates. Mirrors `just test`
# (cargo test --workspace --all-features); mutants in gamut-av1/avif/webp therefore need the
# C toolchain + the third_party/ git submodules checked out.
all_features = true

# Don't mutate the binary/binding crates or the dev-only oracle crates: the binaries' entry points
# aren't unit-tested, and `tooling/` holds the differential *reference decoders* (dav1d/libavif) —
# the test oracle, not the system under test, so mutating it is meaningless (and its high-bit-depth
# FFI paths are only exercised once the encoder emits them). This matches the coverage gate, which
# excludes the same set (justfile `coverage`, --ignore-filename-regex). Stub crates
# (av2/jxl/vvc/heic) contain no function bodies and generate no mutants, so they need no entry here.
exclude_globs = [
    "crates/gamut-cli/**",
    "crates/gamut-wasm/**",
    "crates/gamut-ffi/**",
    "tooling/**",
]

# The test suites are fast (sub-second baselines), so a mutant that runs much longer is
# almost always a genuine infinite loop. Keep a floor well above the baseline so a merely
# slow mutant on a loaded CI runner isn't misreported as a timeout, without burning minutes
# per hang.
minimum_test_timeout = 60

# Provably-equivalent mutants: ones that cannot change observable behaviour, so no test can kill
# them. They are excluded here (with the reason) rather than papered over with contrived tests.
# Each regex is scoped to one function + operator so it can only match the intended mutant — never
# a future, genuinely-killable one. Keep this list short and justified; a gap is *not* an excuse for
# an entry.
exclude_re = [
    # gamut-av1 quant::dequant — `sign = if dq < 0 { -1 } else { 1 }`. The sign multiplies
    # `(|dq| & 0xFF_FFFF) / dq_denom`, which is 0 exactly when `dq == 0`, the only value where
    # `<` and `<=` disagree. `±0 == 0`, so the reconstruction is identical: equivalent.
    'replace < with <= in dequant',
    # gamut-av1 cdf::diagonal_count — `w + h - 1` is the anti-diagonal count; diagonals at index
    # `≥ w+h-1` are empty (`i_lo > i_hi`), so any bound that is larger or equal walks the same
    # non-empty diagonals and yields an identical scan. All three operator mutations only enlarge
    # (or keep) the bound, hence equivalent; a *smaller* bound (not generated here) would differ.
    'replace \+ with \* in diagonal_count',
    'replace - with \+ in diagonal_count',
    'replace - with / in diagonal_count',
    # gamut-av1 filter — equivalents in the in-loop filters (the dav1d oracle pins everything else).
    # constrain: `sign = if diff < 0`, but the magnitude is 0 at `diff == 0` (the only value `<`/`<=`
    # disagree on), so `±0` makes the result identical (same shape as quant::dequant).
    'replace < with <= in constrain',
    # cdef_direction: `while i < 8` steps `i` by 2 from 1, so it only takes odd values and never
    # equals 8 — `<` and `<=` stop at the same place.
    'replace < with <= in cdef_direction',
    # cdef_partials: each directional `partial` enters the cost only as a square, so negating a whole
    # accumulator (any `+=`→`-=`) leaves every `cost += partial²` unchanged. (The `*=`, index math and
    # `- 128` centring mutants are *not* excluded — `cdef_direction_finds_dominant_direction` kills them.)
    'replace \+= with -= in cdef_partials',
    # cdef_disabled: an all-zero-strength CDEF is the identity filter, so the early-return it guards is
    # a pure optimization — taking it or running the (identity) loop produces the same output, making
    # every mutation of the predicate, and the `-> false` body, unobservable. (`-> true` skips real
    # filtering and is caught by `cdef_leaves_flat_unchanged_but_filters_structure`.)
    'replace == with != in cdef_disabled',
    'replace && with \|\| in cdef_disabled',
    'replace cdef_disabled -> bool with false',
    # sec_dir: the two secondary directions `±2` off the primary are summed symmetrically, so `dir+off`
    # vs `dir-off` selects the same pair. (`&`→`|`/`^` and the body mutants change the direction set and
    # are caught by the dav1d cdef oracle.)
    'replace \+ with - in sec_dir',
    # wide_tap_pos: the wide deblock filter is symmetric in `j` with symmetric taps, so reading row
    # `i+j` vs `i-j` sums identically. (`+`→`*` and the body are caught by the deblock oracle.)
    'replace \+ with - in wide_tap_pos',
    # loop_restore_wiener_luma: `if width == 0 || height == 0` is a defensive guard, but the encoder
    # never calls it with a zero dimension and a zero-sized plane is a no-op anyway, so `||`→`&&` (both
    # branches false for the real `≥1` dimensions) cannot change the output.
    'replace \|\| with && in loop_restore_wiener_luma',
    # centred: the §7.15.2 direction search is invariant to a uniform sample offset (each direction
    # cost is a sum of squared partials; the chosen direction is an argmax and the variance a cost
    # *difference*), so flipping the centring `- 128` to `+ 128` cannot change the result. (Verified: the
    # cdef_direction test passes under the mutant for ramp/edge/sparse inputs. `- with /` is NOT masked
    # and is caught.)
    'replace - with \+ in centred',
    # superres_err: see the doc comment — `err` reaches the offset only as `-err/2` and the `& 0x3fff`
    # discards the `2¹⁴`-multiple that `-`→`+` introduces. (The `*`/`<<`/`/` mutants are not masked.)
    'replace - with \+ in superres_err',
    # gamut-av1 tile — equivalents in the entropy/segment helpers (the snapshot + round-trip tests pin
    # everything observable). last_ref: `max - 1` is the largest valid segment ref; a ref is always
    # `< max`, so widening the threshold is never reached and the general neg_interleave path maps
    # `r == max-1` identically.
    'replace - with \+ in last_ref',
    'replace - with / in last_ref',
    # recenter: `if v > 2*ref` — at `v == 2*ref` the else branch yields `2*(v-ref) == 2*ref`, exactly the
    # value the `>=` mutant would return from the `v` branch, so the boundary is a continuity point.
    'replace > with >= in recenter',
    # gamut-bitstream `ec_partition`: its only `-` is the constant shift `7 - EC_PROB_SHIFT` (= 1,
    # since EC_PROB_SHIFT = 6). The `- → /` mutation yields `7 / EC_PROB_SHIFT` = 1 — the identical
    # value — so it is unkillable. (`- → +`/`*` give 13/42 and are caught by the round-trip tests.)
    'replace - with / in ec_partition',
    # gamut-bitstream `SymbolEncoder::finish`: `s = 10 + cnt`, and the encoder holds `cnt` in
    # [-9, -1] (verified over 200k streams), so `s >= 1` always and the `if s > 0` flush guard is
    # always taken. `> → >=` is therefore unobservable. (`> → ==`/`<` skip the loop and are caught.)
    'replace > with >= in SymbolEncoder::finish',
    # gamut-bitstream `SymbolEncoder::finish`: with `s <= 9` the flush loop runs at most twice, and
    # the `n` it shifts is only consumed on an iteration that never executes, so `n >>= 8` is dead.
    # `>>= → <<=` is unobservable. (The loop-bound and `e`/`n` init mutants stay live and are caught.)
    'replace >>= with <<= in SymbolEncoder::finish',
    # gamut-tiff `stored_total > MAX_IMAGE_BYTES` (decode_page_samples) and `tile_size > MAX_IMAGE_BYTES`
    # (decode_tiles) are *allocation* guards: relaxing `>` to `==`/`>=` only changes whether a 64 MiB+
    # buffer is reserved before the (still inevitable) decode error — the malformed file is rejected
    # either way, so the Ok/Err outcome a functional test can see is unchanged. (`> -> <` flips the
    # guard for every normal image and is caught.) These are the only `>` in either function.
    'replace > with == in decode_page_samples',
    'replace > with >= in decode_page_samples',
    'replace > with == in decode_tiles',
    'replace > with >= in decode_tiles',
    # gamut-riff `Vp8xHeader::to_payload`: the feature-flag byte ORs five single bits each shifted to
    # a distinct position (`icc<<5 | alpha<<4 | ...`), so the operands are disjoint and `|` == `^`.
    # gamut-riff `Vp8xHeader::from_payload`: the `le24` closure ORs three bytes at offsets 0/8/16
    # (`b[0] | (b[1]<<8) | (b[2]<<16)`), again disjoint. Both functions' `| -> ^` are equivalent.
    # (Regex: `\|`/`\^` escape the pipe/caret metacharacters.)
    'replace \| with \^ in Vp8xHeader::to_payload',
    'replace \| with \^ in Vp8xHeader::from_payload',
    # gamut-ifd `Value::decode`: the DOUBLE assembly OR's a 32-bit low half with a 32-bit high half
    # shifted up by 32 (`u64::from(a) | (u64::from(b) << 32)`). The operands occupy disjoint bits, so
    # `|` is identical to `^`; both `| -> ^` mutations are equivalent.
    # (Regex: `\|`/`\^` escape the pipe/caret metacharacters.)
    'replace \| with \^ in Value::decode',
    # gamut-dsp `adst_output_permute`: the index is `(d << 3) | (c << 2) | (b << 1) | a`, where each
    # of a/b/c/d is a single bit (0 or 1) shifted to a distinct position, so the OR'd operands never
    # share bits and `|` is identical to `^`. The three `| -> ^` mutations are therefore equivalent.
    # (Regex: `\|`/`\^` escape the pipe/caret metacharacters.)
    'replace \| with \^ in adst_output_permute',
    # gamut-color `vp8_clip8`: the `else if v < 0` branch is reached only when `v` is out of range
    # (`v == 0` takes the `v & !MASK2 == 0` fast path), so `v != 0` always holds there and `v < 0`
    # is equivalent to `v <= 0`. (`v < 0 → v == 0` *is* observable and is killed by a test.)
    'replace < with <= in vp8_clip8',
    # gamut-color `prophoto_rgb_eotf_standard`: the ROMM toe `x/16` and the power curve `x^1.8` are
    # equal at the x = 1/32 breakpoint (both 2^-9), so the curve is continuous and `x < 1/32` vs
    # `x <= 1/32` choose between two identical values there — unobservable. (`1.0/32.0 → 1.0%32.0`
    # *is* observable and is killed by a test at x = 0.5.)
    'replace < with <= in prophoto_rgb_eotf_standard',
]
