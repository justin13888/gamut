# Dev-only oracle: NOT a member of the gamut workspace (listed under
# `[workspace].exclude` in the root manifest, pulled in only as a path
# `dev-dependency`). It statically links zlib (built from the `third_party/zlib`
# submodule) and exposes a reference inflater + compressor for gamut-deflate's
# differential cross-checks. gamut ships no decoder, so this canonical inflater is
# how the pure-Rust DEFLATE/zlib *encoder* is proven correct.
[package]
name = "zlib-oracle"
version = "0.0.0"
edition = "2024"
publish = false
description = "Dev-only FFI oracle: inflates/compresses with a vendored, statically-linked zlib for gamut-deflate's conformance cross-checks."
license = "MIT OR Apache-2.0"
build = "build.rs"
# Declares this crate as the sole provider of the native `z` library.
links = "z"

[lib]
doctest = false

[build-dependencies]
bindgen = "0.71"
