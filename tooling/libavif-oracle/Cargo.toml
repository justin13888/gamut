# Dev-only oracle: NOT a member of the gamut workspace (listed under
# `[workspace].exclude` in the root manifest, pulled in only as a path
# `dev-dependency`). See `tooling/dav1d-oracle/Cargo.toml` for the rationale; the
# same applies here. This crate statically links libavif (built from the
# `third_party/libavif` submodule with the vendored dav1d as its decoder).
[package]
name = "libavif-oracle"
version = "0.0.0"
edition = "2024"
publish = false
description = "Dev-only FFI oracle: decodes AVIF files with a vendored, statically-linked libavif (dav1d backend) for gamut's end-to-end container cross-checks."
license = "MIT OR Apache-2.0"
build = "build.rs"
# Declares this crate as the sole provider of the native `avif` library.
links = "avif"

[lib]
doctest = false

[build-dependencies]
# 0.72 (vs 0.71 in the sibling oracles): libavif's public header forward-declares
# `struct avifImage` / `avifIO` before fully defining them, and bindgen 0.71 renders those as
# opaque (`_address`-only) types under newer libclang (e.g. clang 22), which fails to compile.
# 0.72 resolves the complete definitions. The dav1d/libtiff headers lack this pattern and build
# fine at 0.71, so they are left untouched.
bindgen = "0.72"
# Builds a vendored nasm from a committed source tarball so the stage-1 dav1d meson build
# can assemble dav1d's x86 SIMD without a system nasm (no-op on non-x86 targets).
nasm-vendor = { path = "../nasm-vendor" }
